<!DOCTYPE html>
<html>

<head>
<title>SpeakSafe</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

.card{

width:360px;
height:640px;

background:#1f3247;

border-radius:35px;

padding:40px 30px;

display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;

box-shadow:0 25px 50px rgba(0,0,0,0.5);

}

.title{

font-size:22px;
font-weight:600;
margin-bottom:30px;

}

.avatar{

font-size:60px;
margin-bottom:15px;

}

.wave{

display:flex;
gap:6px;
margin-bottom:30px;

}

.bar{

width:6px;
height:18px;

background:#ff4d4d;

border-radius:10px;

animation:wave 1.2s infinite ease-in-out;

}

.bar:nth-child(2){animation-delay:.1s}
.bar:nth-child(3){animation-delay:.2s}
.bar:nth-child(4){animation-delay:.3s}

@keyframes wave{

0%,100%{height:18px}

50%{height:40px}

}

.mic{

width:90px;
height:90px;

border-radius:50%;

background:#ff4d4d;

display:flex;
align-items:center;
justify-content:center;

font-size:36px;

cursor:pointer;

margin-bottom:25px;

box-shadow:0 0 25px rgba(255,0,0,.6);

transition:.3s;

}

.mic:hover{

transform:scale(1.1);

}

.status{

font-size:15px;
opacity:.8;
margin-bottom:25px;

text-align:center;

}

.alert{

width:100%;

background:#ff4d4d;

padding:12px;

border-radius:12px;

font-weight:500;

text-align:center;

display:none;

margin-bottom:30px;

}

.footer{

margin-top:auto;

font-size:12px;

opacity:.6;

}

</style>

</head>

<body>

<div class="card">

<div class="title">🛡 SpeakSafe</div>

<div class="avatar">🤖</div>

<div class="wave">
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
</div>

<div class="mic" onclick="startListening()">🎤</div>

<div id="output" class="status">
Tap microphone and say "Help"
</div>

<div id="alertBox" class="alert">
🚨 Emergency Detected
</div>

<div class="footer">
AI Voice Emergency Assistant
</div>

</div>

<script src="script.js"></script>

</body>

</html>
